services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - huggingface_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/whisper
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

volumes:
  huggingface_cache:
  whisper_cache:
